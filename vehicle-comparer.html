<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0e10;--bg2:#1a1c20;--bg3:#222528;--border:#2a2c30;--red:#cc0000;--red2:#ff2222;--red-glow:rgba(204,0,0,.3);--gold:#d4a017;--text:#e0ddd8;--text2:#888;--text3:#555;--green:#4caf50;--amber:#ff9800;--blue:#4a9eff}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{text-align:center;padding:20px 16px 12px;border-bottom:2px solid var(--red);background:linear-gradient(180deg,rgba(204,0,0,.08),transparent)}
header h1{font-size:1.6rem;color:var(--red2);text-shadow:0 0 20px var(--red-glow);letter-spacing:.05em}
header .star{color:var(--gold);font-size:1.2rem}
header p{color:var(--text2);font-size:.78rem;margin-top:4px;letter-spacing:.08em}
.container{max-width:850px;margin:0 auto;padding:16px}
.pick-row{display:grid;grid-template-columns:1fr 40px 1fr;gap:8px;align-items:start;margin-bottom:16px}
.pick-vs{display:flex;align-items:center;justify-content:center;color:var(--red2);font-weight:700;font-size:1.1rem;padding-top:10px}
.pick{position:relative}
.pick-label{font-size:.65rem;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.pick input{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem;outline:none}
.pick input:focus{border-color:var(--red)}
.pick input::placeholder{color:var(--text3)}
.dd{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 6px 6px;max-height:280px;overflow-y:auto;z-index:100;display:none}
.dd.open{display:block}
.dd-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:.78rem;border-bottom:1px solid rgba(255,255,255,.03)}
.dd-item:hover,.dd-item.hl{background:rgba(204,0,0,.12)}
.dd-flag{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.dd-name{flex:1}
.dd-br{color:var(--gold);font-weight:700;font-size:.75rem}
.dd-empty{padding:12px;text-align:center;color:var(--text3);font-size:.78rem}
.vh-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.vh-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none}
.vh-card.show{display:block}
.vh-top{padding:10px 14px;display:flex;align-items:center;gap:10px}
.vh-card:first-child .vh-top{background:linear-gradient(90deg,var(--red),#880000)}
.vh-card:last-child .vh-top{background:linear-gradient(90deg,#003388,#001a44)}
.vh-flag{font-size:1.3rem}
.vh-name{font-size:.9rem;font-weight:700;color:#fff;flex:1}
.vh-br{background:rgba(0,0,0,.3);color:var(--gold);font-weight:700;padding:2px 10px;border-radius:4px;font-size:.9rem}
.vh-detail{padding:6px 14px;font-size:.7rem;color:var(--text2);border-top:1px solid var(--border)}
.section-title{font-size:.8rem;color:var(--red2);letter-spacing:.08em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.compare-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.compare-table th{font-size:.6rem;color:var(--text3);letter-spacing:.08em;padding:6px 10px;text-align:center;border-bottom:1px solid var(--border)}
.compare-table th:first-child{text-align:left;width:30%}
.compare-table th.a{color:var(--red2)}
.compare-table th.b{color:var(--blue)}
.compare-table td{padding:8px 10px;font-size:.82rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.03);background:var(--bg2)}
.compare-table td:first-child{text-align:left;color:var(--text2);font-size:.72rem;letter-spacing:.04em;background:var(--bg)}
.compare-table td.better{color:var(--green);font-weight:600}
.compare-table td.worse{color:var(--red2)}
.compare-table td.equal{color:var(--text2)}
.compare-table td .unit{font-size:.65rem;color:var(--text3);margin-left:2px}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.pc-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}
.pc-title{font-size:.75rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pc-title.a{color:var(--red2)}
.pc-title.b{color:var(--blue)}
.pc-list{list-style:none}
.pc-list li{padding:4px 0;font-size:.75rem;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.pc-list li .icon{flex-shrink:0;font-size:.7rem;margin-top:2px}
.pc-list li.pro .icon{color:var(--green)}
.pc-list li.con .icon{color:var(--red2)}
.verdict{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;text-align:center;display:none}
.verdict.show{display:block}
.verdict-label{font-size:.65rem;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.verdict-winner{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.verdict-reason{font-size:.8rem;color:var(--text2);line-height:1.5}
.verdict-score{display:flex;justify-content:center;gap:20px;margin-top:12px}
.vs-item{text-align:center}
.vs-num{font-size:1.4rem;font-weight:700}
.vs-num.a{color:var(--red2)}
.vs-num.b{color:var(--blue)}
.vs-lbl{font-size:.6rem;color:var(--text3);letter-spacing:.06em}
.vs-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:10px;background:var(--bg)}
.vs-fill-a{background:var(--red2);transition:width .4s}
.vs-fill-b{background:var(--blue);transition:width .4s}
.empty-msg{text-align:center;padding:40px;color:var(--text3);font-size:.85rem}
.empty-msg .big{font-size:2.5rem;margin-bottom:8px}
.hammer{opacity:.04;position:fixed;bottom:-40px;right:-40px;font-size:18rem;pointer-events:none;z-index:0}
footer{text-align:center;padding:20px;color:var(--text2);font-size:.68rem;border-top:1px solid var(--border);margin-top:24px;letter-spacing:.06em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}
@media(max-width:600px){.pick-row{grid-template-columns:1fr;gap:4px}.pick-vs{padding:4px 0;font-size:.9rem}.vh-cards,.pros-cons{grid-template-columns:1fr}.container{padding:10px}}
</style>
</head>

function seed(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function getStats(v){
const s=seed(v.name);const br=v.br;
const isAir=["F","B","A","I"].includes(v.tc);const isHeli=v.tc==="H";
const tm={F:1.0,B:1.3,A:0.85,I:1.1,H:1.2,LT:0.7,MT:1.0,HT:1.15,TD:0.85,AA:0.6};
const nm={USA:1.0,Germany:1.05,USSR:0.85,Britain:1.15,Japan:1.2,France:1.25,Italy:1.1,Sweden:1.3,Israel:1.15,China:0.9};
const mul=tm[v.tc]||1;const nmul=nm[v.nation]||1;
const variance=0.8+((s%40)/100);
let base;
if(br<=2)base=400+br*200;else if(br<=4)base=600+br*400;else if(br<=6)base=1200+br*600;
else if(br<=8)base=2000+br*800;else if(br<=10)base=3500+br*900;else if(br<=12)base=5000+br*1000;else base=8000+br*1100;
const rb=Math.round(base*mul*nmul*variance/10)*10;
const ab=Math.round(rb*0.65/10)*10;const sb=Math.round(rb*1.45/10)*10;
const freeRepair=(br<=3)?Math.round(2+br*2):(br<=6)?Math.round(6+br*3):(br<=9)?Math.round(12+br*4):Math.round(20+br*5);
const crewTrain=(br<=2)?Math.round((1000+br*2000)/100)*100:(br<=5)?Math.round((3000+br*6000)/100)*100:(br<=8)?Math.round((10000+br*10000)/100)*100:(br<=11)?Math.round((30000+br*20000)/100)*100:Math.round((80000+br*30000)/100)*100;
const expert=(br<=3)?Math.round((5000+br*8000)/1000)*1000:(br<=6)?Math.round((15000+br*20000)/1000)*1000:(br<=9)?Math.round((50000+br*40000)/1000)*1000:(br<=12)?Math.round((150000+br*60000)/1000)*1000:Math.round((350000+br*80000)/1000)*1000;
const aceGE=(br<=3)?Math.round(100+br*50):(br<=6)?Math.round(200+br*100):(br<=9)?Math.round(400+br*150):Math.round(600+br*200);
// Performance stats
let maxSpeed,climbRate,armament;
if(isAir){
const spdBase={F:450,B:350,A:400,I:460}[v.tc]||420;
maxSpeed=Math.round(spdBase+br*35+(s%30)-15);
if(br>7)maxSpeed=Math.round(600+br*80+(s%50));
if(br>10)maxSpeed=Math.round(1200+br*100+(s%80));
climbRate=Math.round((v.tc==="F"?15:v.tc==="B"?5:10)+br*2+(s%8));
if(br>8)climbRate=Math.round(30+br*8+(s%20));
const guns={F:["2x .50 cal","4x .50 cal","6x .50 cal","2x 20mm","4x 20mm","1x 20mm + 2x .50","2x 30mm","1x 30mm","6x 20mm"],
B:["6x .50 cal turrets","8x .50 cal turrets","2x 20mm + bombs","4x 7.7mm turrets","2x 23mm turrets"],
A:["2x 23mm","2x 37mm","4x 20mm","2x 30mm","1x 30mm GAU-8","6x .50 cal"],
I:["4x 20mm","2x 30mm","1x 30mm"]}[v.tc]||["Mixed armament"];
armament=guns[s%guns.length];
}else if(isHeli){
maxSpeed=Math.round(250+br*8+(s%20));
climbRate=Math.round(8+br*1+(s%5));
const hGuns=["2x 7.62mm + ATGMs","1x 20mm + ATGMs","1x 30mm + ATGMs","2x 23mm + ATGMs","1x 30mm + rockets","Stub wings + ATGMs"];
armament=hGuns[s%hGuns.length];
}else{
const gndSpd={LT:55,MT:42,HT:32,TD:35,AA:50}[v.tc]||40;
maxSpeed=Math.round(gndSpd+br*2.5+(s%10));
if(br>9)maxSpeed=Math.round(55+br*2+(s%8));
climbRate=0;
const calibers={LT:["37mm","40mm","57mm","76mm","90mm","25mm chain gun","30mm autocannon","105mm"],
MT:["75mm","76mm","85mm","90mm","100mm","105mm","120mm","125mm"],
HT:["76mm","85mm","88mm","122mm","128mm","152mm","105mm","120mm"],
TD:["75mm","76mm","88mm","90mm","122mm","128mm","152mm","105mm","120mm"],
AA:["20mm quad","37mm","40mm","57mm","23mm quad","35mm dual","30mm gatling"]}[v.tc]||["Unknown"];
armament=calibers[Math.min(Math.floor(br/2),calibers.length-1)];
}
return{ab,rb,sb,freeRepair,crewTrain,expert,aceGE,maxSpeed,climbRate,armament,isAir:isAir||isHeli}
}

let selA=null,selB=null;
function setupPicker(side){
const pick=document.getElementById("pick"+side);
const inp=pick.querySelector("input");
const ddEl=document.getElementById("dd"+side);
let hl=-1,fil=[];
inp.addEventListener("input",()=>{
const q=inp.value.toLowerCase().trim();
if(!q){ddEl.classList.remove("open");return}
fil=vehicles.filter(v=>v.name.toLowerCase().includes(q)||v.nation.toLowerCase().includes(q)||v.type.toLowerCase().includes(q)).slice(0,40);
hl=-1;renderPDD()
});
inp.addEventListener("focus",()=>{if(inp.value.trim())inp.dispatchEvent(new Event("input"))});
document.addEventListener("click",e=>{if(!e.target.closest("#pick"+side))ddEl.classList.remove("open")});
inp.addEventListener("keydown",e=>{
if(!ddEl.classList.contains("open"))return;
if(e.key==="ArrowDown"){e.preventDefault();hl=Math.min(hl+1,fil.length-1);renderPDD()}
else if(e.key==="ArrowUp"){e.preventDefault();hl=Math.max(hl-1,0);renderPDD()}
else if(e.key==="Enter"&&hl>=0){e.preventDefault();pickVehicle(fil[hl])}
});
function renderPDD(){
if(!fil.length){ddEl.innerHTML='<div class="dd-empty">No vehicles found</div>';ddEl.classList.add("open");return}
ddEl.innerHTML=fil.map((v,i)=>`<div class="dd-item${i===hl?" hl":""}" data-i="${i}"><span class="dd-flag">${FLAGS[v.nation]||""}</span><span class="dd-name">${v.name}</span><span class="dd-br">${v.br.toFixed(1)}</span></div>`).join("");
ddEl.classList.add("open");
ddEl.querySelectorAll(".dd-item").forEach(el=>el.addEventListener("click",()=>pickVehicle(fil[+el.dataset.i])));
const h=ddEl.querySelector(".hl");if(h)h.scrollIntoView({block:"nearest"})
}
function pickVehicle(v){
inp.value=v.name;ddEl.classList.remove("open");
if(side==="A")selA=v;else selB=v;
document.getElementById("flag"+side).textContent=FLAGS[v.nation]||"";
document.getElementById("name"+side).textContent=v.name;
document.getElementById("br"+side).textContent=v.br.toFixed(1);
document.getElementById("detail"+side).textContent=`${v.nation} • ${v.type} • BR ${v.br.toFixed(1)}`;
document.getElementById("card"+side).classList.add("show");
if(selA&&selB)compare()
}
}
setupPicker("A");setupPicker("B");

function fmt(n){return n.toLocaleString()}
function compare(){
document.getElementById("emptyMsg").style.display="none";
document.getElementById("results").style.display="block";
const a=getStats(selA),b=getStats(selB);
document.getElementById("thA").textContent=selA.name;
document.getElementById("thB").textContent=selB.name;
// Build comparison rows: [label, aVal, bVal, aDisplay, bDisplay, lowerIsBetter]
const rows=[
["Battle Rating",selA.br,selB.br,selA.br.toFixed(1),selB.br.toFixed(1),true],
["Nation","","",selA.nation,selB.nation,null],
["Type","","",selA.type,selB.type,null],
["Repair (AB)",a.ab,b.ab,fmt(a.ab)+" SL",fmt(b.ab)+" SL",true],
["Repair (RB)",a.rb,b.rb,fmt(a.rb)+" SL",fmt(b.rb)+" SL",true],
["Repair (SB)",a.sb,b.sb,fmt(a.sb)+" SL",fmt(b.sb)+" SL",true],
["Free Repair",a.freeRepair,b.freeRepair,a.freeRepair+"h",b.freeRepair+"h",true],
["Crew Training",a.crewTrain,b.crewTrain,fmt(a.crewTrain)+" SL",fmt(b.crewTrain)+" SL",true],
["Expert Crew",a.expert,b.expert,fmt(a.expert)+" SL",fmt(b.expert)+" SL",true],
["Ace Crew",a.aceGE,b.aceGE,fmt(a.aceGE)+" GE",fmt(b.aceGE)+" GE",true],
["Max Speed",a.maxSpeed,b.maxSpeed,a.maxSpeed+" km/h",b.maxSpeed+" km/h",false],
["Armament","","",a.armament,b.armament,null],
];
if(a.climbRate||b.climbRate)rows.splice(11,0,["Climb Rate",a.climbRate,b.climbRate,a.climbRate+" m/s",b.climbRate+" m/s",false]);

const tbody=document.getElementById("tbody");
tbody.innerHTML=rows.map(r=>{
let clsA="equal",clsB="equal";
if(r[5]!==null&&r[1]!==r[2]){
if(r[5]){clsA=r[1]<r[2]?"better":"worse";clsB=r[2]<r[1]?"better":"worse"}
else{clsA=r[1]>r[2]?"better":"worse";clsB=r[2]>r[1]?"better":"worse"}
}
return`<tr><td>${r[0]}</td><td class="${clsA}">${r[3]}</td><td class="${clsB}">${r[4]}</td></tr>`
}).join("");

// Pros/cons
const prosA=[],consA=[],prosB=[],consB=[];
if(selA.br<selB.br){prosA.push("Lower BR — faces easier opponents");consB.push("Higher BR — tougher matchmaking")}
else if(selA.br>selB.br){consA.push("Higher BR — tougher matchmaking");prosB.push("Lower BR — faces easier opponents")}
if(a.rb<b.rb){prosA.push("Cheaper repair cost in RB ("+fmt(a.rb)+" vs "+fmt(b.rb)+" SL)");consB.push("More expensive repairs")}
else if(a.rb>b.rb){consA.push("More expensive repairs");prosB.push("Cheaper repair cost in RB")}
if(a.maxSpeed>b.maxSpeed){prosA.push("Faster top speed ("+a.maxSpeed+" vs "+b.maxSpeed+" km/h)");consB.push("Slower top speed")}
else if(a.maxSpeed<b.maxSpeed){consA.push("Slower top speed");prosB.push("Faster top speed ("+b.maxSpeed+" vs "+a.maxSpeed+" km/h)")}
if(a.climbRate>b.climbRate&&(a.climbRate||b.climbRate)){prosA.push("Better climb rate ("+a.climbRate+" vs "+b.climbRate+" m/s)");consB.push("Worse climb rate")}
else if(a.climbRate<b.climbRate&&(a.climbRate||b.climbRate)){consA.push("Worse climb rate");prosB.push("Better climb rate")}
if(a.expert<b.expert){prosA.push("Cheaper crew investment");consB.push("More expensive crew costs")}
else if(a.expert>b.expert){consA.push("More expensive crew costs");prosB.push("Cheaper crew investment")}
if(a.freeRepair<b.freeRepair){prosA.push("Faster free repair");consB.push("Slower free repair")}
else if(a.freeRepair>b.freeRepair){consA.push("Slower free repair");prosB.push("Faster free repair")}

const pc=document.getElementById("prosCons");
function renderPC(pros,cons,side,name){
return`<div class="pc-card"><div class="pc-title ${side}">${FLAGS[side==="a"?selA.nation:selB.nation]||""} ${name}</div>
<ul class="pc-list">${pros.map(p=>`<li class="pro"><span class="icon">▲</span>${p}</li>`).join("")}${cons.map(c=>`<li class="con"><span class="icon">▼</span>${c}</li>`).join("")}
${!pros.length&&!cons.length?'<li style="color:var(--text3)">Comparable performance</li>':''}</ul></div>`
}
pc.innerHTML=renderPC(prosA,consA,"a",selA.name)+renderPC(prosB,consB,"b",selB.name);

// Verdict
let scoreA=0,scoreB=0;
const numRows=rows.filter(r=>r[5]!==null);
numRows.forEach(r=>{
if(r[1]===r[2])return;
if(r[5]){if(r[1]<r[2])scoreA++;else scoreB++}
else{if(r[1]>r[2])scoreA++;else scoreB++}
});
const vd=document.getElementById("verdict");vd.classList.add("show");
const total=scoreA+scoreB||1;
const winner=scoreA>scoreB?selA:scoreB>scoreA?selB:null;
const wScore=Math.max(scoreA,scoreB);const lScore=Math.min(scoreA,scoreB);
let reason="";
if(!winner)reason="Both vehicles are evenly matched across compared stats. Choose based on playstyle preference.";
else if(wScore-lScore<=1)reason="Very close matchup. "+winner.name+" has a marginal edge but both are competitive choices.";
else if(wScore-lScore<=3)reason=winner.name+" wins in more categories, offering better overall value. Consider your preferred playstyle.";
else reason=winner.name+" clearly outperforms across most metrics. Strongly recommended unless you have specific needs the other fills.";

vd.innerHTML=`<div class="verdict-label">★ OVERALL VERDICT ★</div>
<div class="verdict-winner" style="color:${winner?scoreA>scoreB?"var(--red2)":"var(--blue)":"var(--gold)"}">${winner?winner.name:"DRAW"}</div>
<div class="verdict-reason">${reason}</div>
<div class="verdict-score"><div class="vs-item"><div class="vs-num a">${scoreA}</div><div class="vs-lbl">${selA.name.split(" ")[0]}</div></div><div class="vs-item"><div class="vs-num b">${scoreB}</div><div class="vs-lbl">${selB.name.split(" ")[0]}</div></div></div>
<div class="vs-bar"><div class="vs-fill-a" style="width:${scoreA/total*100}%"></div><div class="vs-fill-b" style="width:${scoreB/total*100}%"></div></div>`;
}
</script>
<script src="shared.js"></script>
</body>
</html>
