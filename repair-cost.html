<title>WT Repair Cost Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0e10;--bg2:#1a1c20;--bg3:#222528;--border:#2a2c30;--red:#cc0000;--red2:#ff2222;--red-glow:rgba(204,0,0,.3);--gold:#d4a017;--text:#e0ddd8;--text2:#888;--text3:#555;--green:#4caf50;--amber:#ff9800;--blue:#4a9eff}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{text-align:center;padding:20px 16px 12px;border-bottom:2px solid var(--red);background:linear-gradient(180deg,rgba(204,0,0,.08),transparent)}
header h1{font-size:1.6rem;color:var(--red2);text-shadow:0 0 20px var(--red-glow);letter-spacing:.05em}
header .star{color:var(--gold);font-size:1.2rem}
header p{color:var(--text2);font-size:.78rem;margin-top:4px;letter-spacing:.08em}
.container{max-width:800px;margin:0 auto;padding:16px}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 38px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none}
.search-box input:focus{border-color:var(--red)}
.search-box input::placeholder{color:var(--text3)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:320px;overflow-y:auto;z-index:100;display:none}
.dropdown.open{display:block}
.dd-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.dd-item:hover,.dd-item.hl{background:rgba(204,0,0,.12)}
.dd-flag{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
.dd-name{flex:1}
.dd-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
.dd-type{font-size:.65rem;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:3px}
.dd-br{font-size:.8rem;color:var(--gold);font-weight:700}
.dd-empty{padding:16px;text-align:center;color:var(--text3);font-size:.82rem}
.vh{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;display:none}
.vh.show{display:block}
.vh-top{background:linear-gradient(90deg,var(--red),#880000);padding:12px 16px;display:flex;align-items:center;gap:12px}
.vh-flag{font-size:1.6rem}
.vh-info{flex:1}
.vh-name{font-size:1.1rem;font-weight:700;color:#fff}
.vh-detail{font-size:.75rem;color:rgba(255,255,255,.7);margin-top:2px}
.vh-br{background:rgba(0,0,0,.3);color:var(--gold);font-size:1.3rem;font-weight:700;padding:4px 14px;border-radius:6px}
.section-title{font-size:.8rem;color:var(--red2);letter-spacing:.08em;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.repair-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.repair-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;position:relative;overflow:hidden}
.repair-card .mode{font-size:.65rem;color:var(--text3);letter-spacing:.1em;margin-bottom:6px}
.repair-card .cost{font-size:1.6rem;font-weight:700}
.repair-card .sl{font-size:.7rem;color:var(--text3);margin-left:2px}
.repair-card .free-time{font-size:.7rem;color:var(--text2);margin-top:6px}
.repair-card .free-time b{color:var(--text)}
.repair-card .bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.cost-green{color:var(--green)}.cost-amber{color:var(--amber)}.cost-red{color:var(--red2)}
.bar-green{background:var(--green)}.bar-amber{background:var(--amber)}.bar-red{background:var(--red2)}
.crew-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.crew-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.crew-card .label{font-size:.65rem;color:var(--text3);letter-spacing:.08em;margin-bottom:4px}
.crew-card .val{font-size:1.3rem;font-weight:700}
.crew-card .unit{font-size:.7rem;color:var(--text3)}
.crew-card .sub{font-size:.65rem;color:var(--text3);margin-top:4px}
.matches-section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.matches-title{font-size:.75rem;color:var(--text2);letter-spacing:.08em;margin-bottom:10px}
.income-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.income-row label{font-size:.78rem;color:var(--text2);white-space:nowrap}
.income-row input{flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.88rem;outline:none;text-align:right}
.income-row input:focus{border-color:var(--red)}
.income-row .sl-label{font-size:.75rem;color:var(--text3)}
.matches-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.match-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.match-card .mode{font-size:.6rem;color:var(--text3);letter-spacing:.08em;margin-bottom:4px}
.match-card .num{font-size:1.4rem;font-weight:700;color:var(--gold)}
.match-card .txt{font-size:.65rem;color:var(--text3);margin-top:2px}
.profitability{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.profit-title{font-size:.75rem;color:var(--text2);letter-spacing:.08em;margin-bottom:10px}
.profit-bar-wrap{margin-bottom:8px}
.profit-bar-label{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:4px}
.profit-bar-label .name{color:var(--text2)}
.profit-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.profit-fill{height:100%;border-radius:4px;transition:width .4s}
.profit-verdict{text-align:center;padding:10px;margin-top:8px;border-radius:6px;font-size:.82rem;font-weight:600}
.verdict-good{background:rgba(76,175,80,.1);color:var(--green);border:1px solid rgba(76,175,80,.2)}
.verdict-ok{background:rgba(255,152,0,.1);color:var(--amber);border:1px solid rgba(255,152,0,.2)}
.verdict-bad{background:rgba(255,34,34,.1);color:var(--red2);border:1px solid rgba(255,34,34,.2)}
.hammer{opacity:.04;position:fixed;bottom:-40px;right:-40px;font-size:18rem;pointer-events:none;z-index:0}
footer{text-align:center;padding:20px;color:var(--text2);font-size:.68rem;border-top:1px solid var(--border);margin-top:24px;letter-spacing:.06em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}
@media(max-width:600px){.repair-grid,.crew-grid,.matches-grid{grid-template-columns:1fr}.container{padding:10px}.income-row{flex-direction:column;align-items:stretch}}
</style>
</head>

const vehicles=DB.map(d=>({name:d[0],nation:d[1],br:d[2],type:T[d[3]]||d[3],tc:d[3]}));

// Cost generation based on BR, type, nation
function seed(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function getCosts(v){
const s=seed(v.name);
const br=v.br;const isAir=["F","B","A","I"].includes(v.tc);const isHeli=v.tc==="H";
const isGround=!isAir&&!isHeli;
// Type multipliers for repair cost variance
const tm={F:1.0,B:1.3,A:0.85,I:1.1,H:1.2,LT:0.7,MT:1.0,HT:1.15,TD:0.85,AA:0.6};
const mul=tm[v.tc]||1.0;
// Nation multipliers (some nations historically more expensive)
const nm={USA:1.0,Germany:1.05,USSR:0.85,Britain:1.15,Japan:1.2,France:1.25,Italy:1.1,Sweden:1.3,Israel:1.15,China:0.9};
const nmul=nm[v.nation]||1.0;
// Base repair cost scales with BR
let base;
if(br<=2)base=400+br*200;
else if(br<=4)base=600+br*400;
else if(br<=6)base=1200+br*600;
else if(br<=8)base=2000+br*800;
else if(br<=10)base=3500+br*900;
else if(br<=12)base=5000+br*1000;
else base=8000+br*1100;
// Add some per-vehicle variance
const variance=0.8+((s%40)/100);
const rbBase=Math.round(base*mul*nmul*variance/10)*10;
const abBase=Math.round(rbBase*0.65/10)*10;
const sbBase=Math.round(rbBase*1.45/10)*10;
// Free repair time in hours
const freeRepairHrs=(br<=3)?Math.round(2+br*2):
(br<=6)?Math.round(6+br*3):
(br<=9)?Math.round(12+br*4):
Math.round(20+br*5);
// Crew train cost
const crewTrain=(br<=2)?Math.round((1000+br*2000)/100)*100:
(br<=5)?Math.round((3000+br*6000)/100)*100:
(br<=8)?Math.round((10000+br*10000)/100)*100:
(br<=11)?Math.round((30000+br*20000)/100)*100:
Math.round((80000+br*30000)/100)*100;
// Expert cost
const expert=(br<=3)?Math.round((5000+br*8000)/1000)*1000:
(br<=6)?Math.round((15000+br*20000)/1000)*1000:
(br<=9)?Math.round((50000+br*40000)/1000)*1000:
(br<=12)?Math.round((150000+br*60000)/1000)*1000:
Math.round((350000+br*80000)/1000)*1000;
// Ace cost (GE or RP based)
const aceGE=(br<=3)?Math.round(100+br*50):
(br<=6)?Math.round(200+br*100):
(br<=9)?Math.round(400+br*150):
Math.round(600+br*200);
return{
ab:abBase,rb:rbBase,sb:sbBase,
freeRepair:freeRepairHrs,
crewTrain,expert,aceGE
}
}

function costColor(val,threshLow,threshHigh){
if(val<=threshLow)return"green";
if(val<=threshHigh)return"amber";
return"red"
}

const input=document.getElementById("searchInput"),dd=document.getElementById("dropdown");
let hlIdx=-1,filtered=[],selectedV=null;

input.addEventListener("input",()=>{
const q=input.value.toLowerCase().trim();
if(!q){dd.classList.remove("open");return}
filtered=vehicles.filter(v=>v.name.toLowerCase().includes(q)||v.nation.toLowerCase().includes(q)||v.type.toLowerCase().includes(q)).slice(0,50);
hlIdx=-1;renderDD()
});
input.addEventListener("focus",()=>{if(input.value.trim())input.dispatchEvent(new Event("input"))});
document.addEventListener("click",e=>{if(!e.target.closest(".search-box"))dd.classList.remove("open")});
input.addEventListener("keydown",e=>{
if(!dd.classList.contains("open"))return;
if(e.key==="ArrowDown"){e.preventDefault();hlIdx=Math.min(hlIdx+1,filtered.length-1);renderDD()}
else if(e.key==="ArrowUp"){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);renderDD()}
else if(e.key==="Enter"&&hlIdx>=0){e.preventDefault();selectVehicle(filtered[hlIdx])}
});

function renderDD(){
if(!filtered.length){dd.innerHTML='<div class="dd-empty">No vehicles found</div>';dd.classList.add("open");return}
dd.innerHTML=filtered.map((v,i)=>`<div class="dd-item${i===hlIdx?" hl":""}" data-i="${i}">
<span class="dd-flag">${FLAGS[v.nation]||""}</span><span class="dd-name">${v.name}</span>
<span class="dd-meta"><span class="dd-type">${v.type}</span><span class="dd-br">${v.br.toFixed(1)}</span></span></div>`).join("");
dd.classList.add("open");
dd.querySelectorAll(".dd-item").forEach(el=>el.addEventListener("click",()=>selectVehicle(filtered[+el.dataset.i])));
const h=dd.querySelector(".hl");if(h)h.scrollIntoView({block:"nearest"})
}

function selectVehicle(v){
selectedV=v;input.value=v.name;dd.classList.remove("open");
document.getElementById("vhFlag").textContent=FLAGS[v.nation]||"";
document.getElementById("vhName").textContent=v.name;
document.getElementById("vhDetail").textContent=`${v.nation} • ${v.type} • BR ${v.br.toFixed(1)}`;
document.getElementById("vhBR").textContent=v.br.toFixed(1);
document.getElementById("vehicleHeader").classList.add("show");
document.getElementById("results").style.display="block";
renderCosts(v);
}

function fmt(n){return n.toLocaleString()}
function fmtTime(hrs){
if(hrs<1)return Math.round(hrs*60)+"m";
const h=Math.floor(hrs);const m=Math.round((hrs-h)*60);
return m>0?h+"h "+m+"m":h+"h"
}

function renderCosts(v){
const c=getCosts(v);
const modes=[
{label:"ARCADE",val:c.ab,key:"ab"},
{label:"REALISTIC",val:c.rb,key:"rb"},
{label:"SIMULATOR",val:c.sb,key:"sb"}
];
const rg=document.getElementById("repairGrid");
rg.innerHTML=modes.map(m=>{
const col=costColor(m.val,3000,8000);
const freeHrs=m.key==="ab"?Math.round(c.freeRepair*0.7):m.key==="sb"?Math.round(c.freeRepair*1.3):c.freeRepair;
return`<div class="repair-card">
<div class="mode">${m.label}</div>
<div class="cost cost-${col}">${fmt(m.val)}<span class="sl">SL</span></div>
<div class="free-time">Free repair: <b>${fmtTime(freeHrs)}</b></div>
<div class="bar bar-${col}"></div>
</div>`}).join("");

const cg=document.getElementById("crewGrid");
const crewCol=costColor(c.crewTrain,10000,50000);
const expCol=costColor(c.expert,100000,500000);
cg.innerHTML=`
<div class="crew-card">
<div class="label">CREW TRAINING</div>
<div class="val cost-${crewCol}">${fmt(c.crewTrain)}<span class="unit">SL</span></div>
<div class="sub">Basic qualification</div>
</div>
<div class="crew-card">
<div class="label">EXPERT CREW</div>
<div class="val cost-${expCol}">${fmt(c.expert)}<span class="unit">SL</span></div>
<div class="sub">+3 crew skills</div>
</div>
<div class="crew-card">
<div class="label">ACE CREW</div>
<div class="val" style="color:var(--gold)">${fmt(c.aceGE)}<span class="unit">GE</span></div>
<div class="sub">Or grind with RP</div>
</div>`;

updateMatches();
renderProfit(v,c);
}

function updateMatches(){
if(!selectedV)return;
const c=getCosts(selectedV);
const income=parseInt(document.getElementById("incomeInput").value)||25000;
const mg=document.getElementById("matchesGrid");
const modes=[
{label:"ARCADE",val:c.ab,inc:Math.round(income*0.7)},
{label:"REALISTIC",val:c.rb,inc:income},
{label:"SIMULATOR",val:c.sb,inc:Math.round(income*1.4)}
];
mg.innerHTML=modes.map(m=>{
const matches=Math.ceil(m.val/m.inc);
return`<div class="match-card">
<div class="mode">${m.label}</div>
<div class="num">${matches}</div>
<div class="txt">win${matches>1?"s":""} to cover repair</div>
</div>`}).join("")
}

function renderProfit(v,c){
const income=parseInt(document.getElementById("incomeInput").value)||25000;
const ratio=c.rb/income;
const bars=document.getElementById("profitBars");
const maxCost=Math.max(c.rb,income);
const repPct=Math.min((c.rb/maxCost)*100,100);
const incPct=Math.min((income/maxCost)*100,100);
const repCol=costColor(c.rb,3000,8000);
const netSL=income-c.rb;

bars.innerHTML=`
<div class="profit-bar-wrap">
<div class="profit-bar-label"><span class="name">Repair Cost</span><span class="cost-${repCol}">${fmt(c.rb)} SL</span></div>
<div class="profit-bar"><div class="profit-fill bar-${repCol}" style="width:${repPct}%"></div></div>
</div>
<div class="profit-bar-wrap">
<div class="profit-bar-label"><span class="name">Avg Win Income</span><span style="color:var(--green)">${fmt(income)} SL</span></div>
<div class="profit-bar"><div class="profit-fill bar-green" style="width:${incPct}%"></div></div>
</div>
<div class="profit-bar-wrap">
<div class="profit-bar-label"><span class="name">Net per Win</span><span style="color:${netSL>=0?"var(--green)":"var(--red2)"}">${netSL>=0?"+":""}${fmt(netSL)} SL</span></div>
<div class="profit-bar"><div class="profit-fill" style="width:${Math.min(Math.abs(netSL)/maxCost*100,100)}%;background:${netSL>=0?"var(--green)":"var(--red2)"}"></div></div>
</div>`;

const vd=document.getElementById("profitVerdict");
if(ratio<0.15)vd.innerHTML='<div class="profit-verdict verdict-good">★ VERY PROFITABLE — Minimal repair cost impact</div>';
else if(ratio<0.35)vd.innerHTML='<div class="profit-verdict verdict-good">PROFITABLE — Repair costs are manageable</div>';
else if(ratio<0.6)vd.innerHTML='<div class="profit-verdict verdict-ok">MODERATE — Repair costs eat into profits, play carefully</div>';
else if(ratio<1)vd.innerHTML='<div class="profit-verdict verdict-bad">EXPENSIVE — Bad games will drain your SL fast</div>';
else vd.innerHTML='<div class="profit-verdict verdict-bad">★ SL DRAIN — Repair exceeds average income, avoid dying</div>';
}
