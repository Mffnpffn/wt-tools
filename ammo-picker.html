*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0e10;--bg2:#1a1c20;--bg3:#222528;--bg4:#2a2d32;--border:#2a2c30;--red:#cc0000;--red2:#ff2222;--red-glow:rgba(204,0,0,.3);--gold:#d4a017;--text:#e0ddd8;--text2:#888;--text3:#555;--green:#4caf50;--blue:#4a9eff;--orange:#ff8c00;--silver:#b0b0b0;--aphe:#d4a017;--ap:#b0b0b0;--heat:#ff8c00;--apds:#4a9eff;--apfsds:#4caf50;--he:#ff4444;--apcr:#c77dff;--hesh:#e67e22;--atgm:#e91e9c}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3{font-weight:700}
header{text-align:center;padding:20px 16px 12px;border-bottom:2px solid var(--red);background:linear-gradient(180deg,rgba(204,0,0,.08),transparent)}
header h1{font-size:1.6rem;color:var(--red2);text-shadow:0 0 20px var(--red-glow);letter-spacing:.05em}
header .star{color:var(--gold);font-size:1.2rem}
header p{color:var(--text2);font-size:.78rem;margin-top:4px;letter-spacing:.08em}
.container{max-width:850px;margin:0 auto;padding:16px}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 38px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none}
.search-box input:focus{border-color:var(--red)}
.search-box input::placeholder{color:var(--text3)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1rem}
.dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:320px;overflow-y:auto;z-index:100;display:none}
.dropdown.open{display:block}
.dd-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.dd-item:hover,.dd-item.hl{background:rgba(204,0,0,.12)}
.dd-flag{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center}
.dd-name{flex:1}
.dd-br{font-size:.8rem;color:var(--gold);font-weight:700}
.dd-gun{font-size:.68rem;color:var(--text3)}
.dd-empty{padding:16px;text-align:center;color:var(--text3);font-size:.82rem}
.vehicle-header{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;display:none}
.vehicle-header.show{display:block}
.vh-top{background:linear-gradient(90deg,var(--red),#880000);padding:12px 16px;display:flex;align-items:center;gap:12px}
.vh-flag{font-size:1.6rem}
.vh-info{flex:1}
.vh-name{font-size:1.1rem;font-weight:700;color:#fff}
.vh-detail{font-size:.75rem;color:rgba(255,255,255,.7);margin-top:2px}
.vh-br{background:rgba(0,0,0,.3);color:var(--gold);font-size:1.3rem;font-weight:700;padding:4px 14px;border-radius:6px}
.vh-gun{padding:10px 16px;display:flex;align-items:center;gap:8px;background:var(--bg3);font-size:.8rem;color:var(--text2);border-top:1px solid var(--border)}
.vh-gun b{color:var(--text);font-weight:600}
.section-title{font-size:.85rem;color:var(--red2);letter-spacing:.08em;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.ammo-grid{display:flex;flex-direction:column;gap:8px}
.ammo-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:transform .1s}
.ammo-card:active{transform:scale(.99)}
.ammo-top{display:flex;align-items:center;gap:10px;padding:10px 14px}
.ammo-type-badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:4px;min-width:56px;text-align:center;color:#000;flex-shrink:0}
.ammo-type-badge.APHE{background:var(--aphe)}.ammo-type-badge.AP{background:var(--ap)}.ammo-type-badge.HEAT{background:var(--heat)}
.ammo-type-badge.APDS{background:var(--apds)}.ammo-type-badge.APFSDS{background:var(--apfsds);color:#fff}
.ammo-type-badge.HE{background:var(--he)}.ammo-type-badge.APCR{background:var(--apcr)}.ammo-type-badge.HESH{background:var(--hesh)}
.ammo-type-badge.ATGM{background:var(--atgm);color:#fff}.ammo-type-badge.APCBC{background:var(--aphe)}
.ammo-type-badge.HEAT-FS{background:var(--heat)}.ammo-type-badge.HE-VT{background:#e91e9c;color:#fff}
.ammo-name{flex:1;font-size:.82rem;font-weight:600}
.ammo-best{font-size:.6rem;padding:2px 6px;border-radius:3px;background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3);flex-shrink:0}
.ammo-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:1px;background:var(--border);border-top:1px solid var(--border)}
.ammo-stat{background:var(--bg2);padding:8px 10px;text-align:center}
.ammo-stat .label{font-size:.6rem;color:var(--text3);letter-spacing:.06em;margin-bottom:2px}
.ammo-stat .val{font-size:.95rem;font-weight:700}
.ammo-stat .unit{font-size:.65rem;color:var(--text3);margin-left:1px}
.pen-bar{height:4px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.pen-fill{height:100%;border-radius:2px;transition:width .4s}
.rec-section{margin-top:20px;display:none}
.rec-section.show{display:block}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color .2s}
.rec-card:hover{border-color:rgba(204,0,0,.3)}
.rec-icon{font-size:1.4rem;margin-bottom:6px}
.rec-title{font-size:.75rem;color:var(--text2);letter-spacing:.06em;margin-bottom:6px}
.rec-ammo{font-weight:700;font-size:.9rem;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.rec-reason{font-size:.72rem;color:var(--text3);line-height:1.4}
.rec-badge{font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:700;color:#000}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.hammer{opacity:.04;position:fixed;bottom:-40px;right:-40px;font-size:18rem;pointer-events:none;z-index:0}
footer{text-align:center;padding:20px;color:var(--text2);font-size:.68rem;border-top:1px solid var(--border);margin-top:24px;letter-spacing:.06em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}
@media(max-width:600px){.rec-grid{grid-template-columns:1fr}.ammo-stats{grid-template-columns:repeat(3,1fr)}.container{padding:10px}}
</style>

const input=document.getElementById("searchInput"),dd=document.getElementById("dropdown");
let hlIdx=-1,filtered=[];

input.addEventListener("input",()=>{
const q=input.value.toLowerCase().trim();
if(!q){dd.classList.remove("open");return}
filtered=VDB.filter(v=>v.name.toLowerCase().includes(q)||v.nation.toLowerCase().includes(q)).slice(0,40);
hlIdx=-1;renderDD()
});
input.addEventListener("focus",()=>{if(input.value.trim())input.dispatchEvent(new Event("input"))});
document.addEventListener("click",e=>{if(!e.target.closest(".search-box"))dd.classList.remove("open")});
input.addEventListener("keydown",e=>{
if(!dd.classList.contains("open"))return;
if(e.key==="ArrowDown"){e.preventDefault();hlIdx=Math.min(hlIdx+1,filtered.length-1);renderDD()}
else if(e.key==="ArrowUp"){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);renderDD()}
else if(e.key==="Enter"&&hlIdx>=0){e.preventDefault();selectVehicle(filtered[hlIdx])}
});

function renderDD(){
if(!filtered.length){dd.innerHTML='<div class="dd-empty">No vehicles found</div>';dd.classList.add("open");return}
dd.innerHTML=filtered.map((v,i)=>`<div class="dd-item${i===hlIdx?" hl":""}" data-i="${i}">
<span class="dd-flag">${FLAGS[v.nation]||""}</span><span class="dd-name">${v.name}</span>
<span class="dd-gun">${v.gun}</span><span class="dd-br">${v.br.toFixed(1)}</span></div>`).join("");
dd.classList.add("open");
dd.querySelectorAll(".dd-item").forEach(el=>el.addEventListener("click",()=>selectVehicle(filtered[+el.dataset.i])));
const h=dd.querySelector(".hl");if(h)h.scrollIntoView({block:"nearest"})
}

function selectVehicle(v){
input.value=v.name;dd.classList.remove("open");
document.getElementById("vhFlag").textContent=FLAGS[v.nation]||"";
document.getElementById("vhName").textContent=v.name;
document.getElementById("vhDetail").textContent=`${v.nation} • ${v.type} • BR ${v.br.toFixed(1)}`;
document.getElementById("vhBR").textContent=v.br.toFixed(1);
document.getElementById("vhGun").textContent=v.gun;
document.getElementById("vehicleHeader").classList.add("show");
renderAmmo(v);
renderRecs(v);
}

function typeColor(t){
const m={"APHE":"var(--aphe)","APCBC":"var(--aphe)","AP":"var(--ap)","HEAT":"var(--heat)","HEAT-FS":"var(--heat)",
"APDS":"var(--apds)","APFSDS":"var(--apfsds)","HE":"var(--he)","APCR":"var(--apcr)","HESH":"var(--hesh)",
"ATGM":"var(--atgm)","HE-VT":"#e91e9c"};
return m[t]||"var(--text2)"
}

function renderAmmo(v){
const maxPen=Math.max(...v.ammo.map(a=>a.pen0));
const sec=document.getElementById("ammoSection");sec.style.display="block";
const grid=document.getElementById("ammoGrid");
// find best for each situation
const recs=getRecs(v);
const bestNames=new Set(Object.values(recs).map(r=>r.name));

grid.innerHTML=v.ammo.map(a=>{
const penPct=(a.pen0/maxPen*100).toFixed(0);
const col=typeColor(a.type);
return`<div class="ammo-card">
<div class="ammo-top">
<span class="ammo-type-badge ${a.type.replace('-','')}" style="background:${col}">${a.type}</span>
<span class="ammo-name">${a.name}</span>
${bestNames.has(a.name)?'<span class="ammo-best">★ RECOMMENDED</span>':''}
</div>
<div class="ammo-stats">
<div class="ammo-stat"><div class="label">PEN @ 0°</div><div class="val" style="color:${col}">${a.pen0}<span class="unit">mm</span></div>
<div class="pen-bar"><div class="pen-fill" style="width:${penPct}%;background:${col}"></div></div></div>
<div class="ammo-stat"><div class="label">PEN @ 60°</div><div class="val">${a.pen60}<span class="unit">mm</span></div></div>
<div class="ammo-stat"><div class="label">VELOCITY</div><div class="val">${a.vel}<span class="unit">m/s</span></div></div>
<div class="ammo-stat"><div class="label">FILLER</div><div class="val">${a.filler>0?a.filler.toFixed(2)+"<span class='unit'>kg</span>":"—"}</div></div>
<div class="ammo-stat"><div class="label">DAMAGE TYPE</div><div class="val" style="font-size:.72rem">${a.dmgType}</div></div>
<div class="ammo-stat"><div class="label">NOTES</div><div class="val" style="font-size:.68rem;color:var(--text2)">${a.note}</div></div>
</div></div>`}).join("")
}

function getRecs(v){
const ammo=v.ammo;
const recs={};
// Long range sniping: highest velocity kinetic with good pen
const sniping=ammo.filter(a=>["APFSDS","APDS","APHE","AP","APCBC"].includes(a.type)).sort((a,b)=>{
const sa=a.vel*0.4+a.pen0*0.6;const sb=b.vel*0.4+b.pen0*0.6;return sb-sa});
if(sniping[0])recs.snipe={...sniping[0],reason:"Highest velocity + penetration for reliable hits at distance"};
// Close range brawling: best post-pen (filler + pen combo)
const brawl=ammo.filter(a=>a.pen0>30).sort((a,b)=>{
const sa=a.filler*500+a.pen0+(a.type.includes("APHE")?100:0);
const sb=b.filler*500+b.pen0+(b.type.includes("APHE")?100:0);return sb-sa});
if(brawl[0])recs.brawl={...brawl[0],reason:brawl[0].filler>0?"Explosive filler maximises internal damage for one-shot kills":"Best combination of penetration and damage at close range"};
// Heavy tanks: highest raw penetration
const heavy=ammo.slice().sort((a,b)=>b.pen0-a.pen0);
if(heavy[0])recs.heavy={...heavy[0],reason:`Highest penetration at ${heavy[0].pen0}mm to defeat heavy armour frontally`};
// Light vehicles: HE or HEAT for overpressure
const light=ammo.filter(a=>["HE","HEAT","HEAT-FS","HESH","HE-VT"].includes(a.type)).sort((a,b)=>b.filler-a.filler);
if(light[0])recs.light={...light[0],reason:"Explosive damage for overpressure kills on light/open-top vehicles"};
else{const fallback=ammo.filter(a=>a.filler>0).sort((a,b)=>b.filler-a.filler);if(fallback[0])recs.light={...fallback[0],reason:"Best available explosive filler for post-pen damage"}}
return recs
}

function renderRecs(v){
const recs=getRecs(v);
const sec=document.getElementById("recSection");
if(!Object.keys(recs).length){sec.classList.remove("show");return}
sec.classList.add("show");
const grid=document.getElementById("recGrid");
const scenarios=[
{key:"snipe",icon:"🎯",title:"LONG RANGE SNIPING"},
{key:"brawl",icon:"💥",title:"CLOSE RANGE BRAWL"},
{key:"heavy",icon:"🛡️",title:"VS HEAVY ARMOUR"},
{key:"light",icon:"💨",title:"VS LIGHT VEHICLES"}
];
grid.innerHTML=scenarios.filter(s=>recs[s.key]).map(s=>{
const r=recs[s.key];const col=typeColor(r.type);
return`<div class="rec-card">
<div class="rec-icon">${s.icon}</div>
<div class="rec-title">${s.title}</div>
<div class="rec-ammo"><span class="rec-badge" style="background:${col}">${r.type}</span>${r.name}</div>
<div class="rec-reason">${r.reason}</div>
</div>`}).join("")
}
</script>
<script src="shared.js"></script>
</body>
</html>
