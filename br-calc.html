<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>WT BR Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0e10;--bg2:#1a1c20;--bg3:#222528;--border:#2a2c30;--red:#cc0000;--red2:#ff2222;--red-glow:rgba(204,0,0,.3);--gold:#d4a017;--text:#e0ddd8;--text2:#888;--text3:#555;--green:#4caf50;--blue:#4a9eff;--uptier:#ff4444;--downtier:#44bb44;--same:#d4a017}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3{font-weight:700}
header{text-align:center;padding:20px 16px 12px;border-bottom:2px solid var(--red);background:linear-gradient(180deg,rgba(204,0,0,.08),transparent)}
header h1{font-size:1.6rem;color:var(--red2);text-shadow:0 0 20px var(--red-glow);letter-spacing:.05em}
header .star{color:var(--gold);font-size:1.2rem}
header p{color:var(--text2);font-size:.78rem;margin-top:4px;letter-spacing:.08em}
.container{max-width:800px;margin:0 auto;padding:16px}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 38px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none}
.search-box input:focus{border-color:var(--red)}
.search-box input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1rem}
.dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:320px;overflow-y:auto;z-index:100;display:none}
.dropdown.open{display:block}
.dd-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.dd-item:hover,.dd-item.hl{background:rgba(204,0,0,.12)}
.dd-flag{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center}
.dd-name{flex:1;color:var(--text)}
.dd-meta{display:flex;gap:8px;flex-shrink:0;align-items:center}
.dd-type{font-size:.65rem;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:3px}
.dd-br{font-size:.8rem;color:var(--gold);font-weight:700;min-width:28px;text-align:right}
.dd-empty{padding:16px;text-align:center;color:var(--text3);font-size:.82rem}
.selected-vehicle{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;display:none}
.selected-vehicle.show{display:block}
.sv-header{background:linear-gradient(90deg,var(--red),#880000);padding:12px 16px;display:flex;align-items:center;gap:12px}
.sv-flag{font-size:1.6rem}
.sv-info{flex:1}
.sv-name{font-size:1.1rem;font-weight:700;color:#fff}
.sv-detail{font-size:.75rem;color:rgba(255,255,255,.7);margin-top:2px}
.sv-br-badge{background:rgba(0,0,0,.3);color:var(--gold);font-size:1.4rem;font-weight:700;padding:4px 14px;border-radius:6px}
.br-spread{padding:16px}
.br-bar{position:relative;height:40px;background:var(--bg);border-radius:6px;overflow:hidden;margin:8px 0 12px;display:flex}
.br-zone{height:100%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;transition:width .3s}
.br-zone.downtier{background:rgba(68,187,68,.15);color:var(--downtier);border-right:1px solid rgba(68,187,68,.3)}
.br-zone.same{background:rgba(212,160,23,.15);color:var(--same)}
.br-zone.uptier{background:rgba(255,68,68,.15);color:var(--uptier);border-left:1px solid rgba(255,68,68,.3)}
.br-labels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text2);margin-bottom:4px}
.br-spread-title{font-size:.75rem;color:var(--text2);letter-spacing:.08em;margin-bottom:8px}
.br-range-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.br-range-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.br-range-card.downtier{border-color:rgba(68,187,68,.3)}
.br-range-card.same{border-color:rgba(212,160,23,.3)}
.br-range-card.uptier{border-color:rgba(255,68,68,.3)}
.brc-label{font-size:.6rem;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.brc-range{font-size:1rem;font-weight:700}
.br-range-card.downtier .brc-range{color:var(--downtier)}
.br-range-card.same .brc-range{color:var(--same)}
.br-range-card.uptier .brc-range{color:var(--uptier)}
.notable-section{margin-top:16px}
.notable-title{font-size:.85rem;color:var(--red2);letter-spacing:.08em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.notable-title .count{color:var(--text3);font-weight:400;font-size:.75rem}
.nation-group{margin-bottom:12px}
.nation-header{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;user-select:none}
.nation-flag{font-size:1.1rem}
.nation-name{font-size:.8rem;font-weight:600;color:var(--text);flex:1}
.nation-count{font-size:.68rem;color:var(--text3);background:var(--bg3);padding:1px 8px;border-radius:10px}
.nation-vehicles{display:grid;grid-template-columns:1fr;gap:4px;padding:4px 0 4px 32px}
.nv{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-radius:6px;font-size:.78rem;border-left:3px solid transparent}
.nv.uptier{border-left-color:var(--uptier)}
.nv.downtier{border-left-color:var(--downtier)}
.nv.same-br{border-left-color:var(--same)}
.nv-name{flex:1}
.nv-type{font-size:.62rem;color:var(--text3);background:var(--bg);padding:1px 5px;border-radius:3px}
.nv-br{font-weight:700;font-size:.78rem;min-width:28px;text-align:right}
.nv.uptier .nv-br{color:var(--uptier)}
.nv.downtier .nv-br{color:var(--downtier)}
.nv.same-br .nv-br{color:var(--same)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:5px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:.7rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:rgba(204,0,0,.15);border-color:var(--red);color:var(--red2)}
.hammer{opacity:.04;position:fixed;bottom:-40px;right:-40px;font-size:18rem;pointer-events:none;z-index:0}
.scroll-top{position:fixed;bottom:16px;right:16px;width:40px;height:40px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;display:none;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.5)}
footer{text-align:center;padding:20px;color:var(--text2);font-size:.68rem;border-top:1px solid var(--border);margin-top:24px;letter-spacing:.06em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}
@media(max-width:600px){.br-range-cards{grid-template-columns:1fr}.container{padding:10px}}
</style>
</head>

const vehicles=DB.map(d=>({name:d[0],nation:d[1],br:d[2],type:T[d[3]]||d[3],typeCode:d[3]}));
const input=document.getElementById("searchInput");
const dd=document.getElementById("dropdown");
let hlIdx=-1,filtered=[];

function brStr(b){return b%1===0?b.toFixed(1):b.toFixed(1)}

input.addEventListener("input",()=>{
const q=input.value.toLowerCase().trim();
if(!q){dd.classList.remove("open");return}
filtered=vehicles.filter(v=>v.name.toLowerCase().includes(q)||v.nation.toLowerCase().includes(q)||v.type.toLowerCase().includes(q)).slice(0,50);
hlIdx=-1;
renderDD();
});
input.addEventListener("focus",()=>{if(input.value.trim())input.dispatchEvent(new Event("input"))});
document.addEventListener("click",e=>{if(!e.target.closest(".search-box"))dd.classList.remove("open")});

input.addEventListener("keydown",e=>{
if(!dd.classList.contains("open"))return;
if(e.key==="ArrowDown"){e.preventDefault();hlIdx=Math.min(hlIdx+1,filtered.length-1);renderDD()}
else if(e.key==="ArrowUp"){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);renderDD()}
else if(e.key==="Enter"&&hlIdx>=0){e.preventDefault();selectVehicle(filtered[hlIdx])}
});

function renderDD(){
if(!filtered.length){dd.innerHTML='<div class="dd-empty">No vehicles found</div>';dd.classList.add("open");return}
dd.innerHTML=filtered.map((v,i)=>`<div class="dd-item${i===hlIdx?" hl":""}" data-i="${i}"><span class="dd-flag">${FLAGS[v.nation]||""}</span><span class="dd-name">${v.name}</span><span class="dd-meta"><span class="dd-type">${v.type}</span><span class="dd-br">${brStr(v.br)}</span></span></div>`).join("");
dd.classList.add("open");
dd.querySelectorAll(".dd-item").forEach(el=>el.addEventListener("click",()=>selectVehicle(filtered[+el.dataset.i])));
const hlEl=dd.querySelector(".hl");if(hlEl)hlEl.scrollIntoView({block:"nearest"});
}

let activeFilters=new Set(["F","B","A","H","I","LT","MT","HT","TD","AA"]);
let selectedV=null;

function selectVehicle(v){
selectedV=v;
input.value=v.name;
dd.classList.remove("open");
document.getElementById("svFlag").textContent=FLAGS[v.nation]||"";
document.getElementById("svName").textContent=v.name;
document.getElementById("svDetail").textContent=`${v.nation} • ${v.type}`;
document.getElementById("svBR").textContent=brStr(v.br);
document.getElementById("selectedVehicle").classList.add("show");
const minBR=Math.max(1.0,+(v.br-1.0).toFixed(1));
const maxBR=+(v.br+1.0).toFixed(1);
document.getElementById("brMin").textContent=brStr(minBR);
document.getElementById("brCenter").textContent=brStr(v.br);
document.getElementById("brMax").textContent=brStr(maxBR);
document.getElementById("downRange").textContent=brStr(minBR)+" – "+brStr(+(v.br-0.3).toFixed(1));
document.getElementById("sameRange").textContent=brStr(v.br);
document.getElementById("upRange").textContent=brStr(+(v.br+0.3).toFixed(1))+" – "+brStr(maxBR);
const total=maxBR-minBR;
const downW=((v.br-minBR)/total*100);
const upW=((maxBR-v.br)/total*100);
document.getElementById("zDown").style.width=Math.max(downW,10)+"%";
document.getElementById("zUp").style.width=Math.max(upW,10)+"%";
document.getElementById("zSame").style.width=Math.max(100-downW-upW,10)+"%";
renderFilters();
renderNotable(v,minBR,maxBR);
}

function renderFilters(){
const types=[["F","Fighter"],["B","Bomber"],["A","Attacker"],["I","Interceptor"],["H","Helicopter"],["LT","Light Tank"],["MT","Medium Tank"],["HT","Heavy Tank"],["TD","Tank Destroyer"],["AA","SPAA"]];
document.getElementById("filterRow").innerHTML=types.map(([c,l])=>`<div class="filter-btn${activeFilters.has(c)?" active":""}" data-f="${c}">${l}</div>`).join("");
document.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{
const f=b.dataset.f;
if(activeFilters.has(f))activeFilters.delete(f);else activeFilters.add(f);
b.classList.toggle("active");
if(selectedV){const mn=Math.max(1.0,+(selectedV.br-1.0).toFixed(1));renderNotable(selectedV,mn,+(selectedV.br+1.0).toFixed(1))}
}));
}

function renderNotable(v,minBR,maxBR){
const sec=document.getElementById("notableSection");sec.style.display="block";
const matches=vehicles.filter(o=>o!==v&&o.br>=minBR&&o.br<=maxBR&&activeFilters.has(o.typeCode));
document.getElementById("matchCount").textContent=`(${matches.length} vehicles)`;
const byNation={};
const nationOrder=["USSR","USA","Germany","Britain","Japan","France","Italy","Sweden","Israel","China"];
matches.forEach(m=>{if(!byNation[m.nation])byNation[m.nation]=[];byNation[m.nation].push(m)});
const container=document.getElementById("nationGroups");
container.innerHTML=nationOrder.filter(n=>byNation[n]).map(n=>{
const vs=byNation[n].sort((a,b)=>a.br-b.br);
return`<div class="nation-group"><div class="nation-header"><span class="nation-flag">${FLAGS[n]}</span><span class="nation-name">${n}</span><span class="nation-count">${vs.length}</span></div><div class="nation-vehicles">${vs.map(m=>{
let cls="same-br";
if(m.br>v.br+0.3)cls="uptier";
else if(m.br<v.br-0.3)cls="downtier";
return`<div class="nv ${cls}"><span class="nv-name">${m.name}</span><span class="nv-type">${m.type}</span><span class="nv-br">${brStr(m.br)}</span></div>`;
}).join("")}</div></div>`;
}).join("");
}

window.addEventListener("scroll",()=>{document.getElementById("scrollTop").style.display=window.scrollY>300?"block":"none"});
</script>
